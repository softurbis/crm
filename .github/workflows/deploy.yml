name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Publicar (intento 1)
        id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Esperar antes de reintentar
        if: steps.d1.outcome == 'failure'
        run: sleep 45

      - name: Publicar (intento 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Esperar antes del ultimo intento
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 90

      - name: Publicar (intento 3)
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
